ci:
    autofix_commit_msg: 'chore: auto fixes from pre-commit hooks'
    autoupdate_commit_msg: 'chore: pre-commit automatic update'
    autoupdate_schedule: weekly

exclude: '^tests/embedding/assets/.*$|^tests/parts/.*$'

repos:

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: a27a2e47c7751b639d2b5badf0ef6ff11fee893f  # frozen: v0.15.4
  hooks:
    - id: ruff
    - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: a66e98df7b4aeeb3724184b332785976d062b92e  # frozen: v1.19.1
  hooks:
    - id: mypy
      additional_dependencies: [types-requests, types-tqdm]
      args: [--ignore-missing-imports]
      exclude: ^(tests|examples|doc)/

- repo: https://github.com/pre-commit-ci/pre-commit-ci-config
  rev: 500543de231a91e6157db630075d70320709b834  # frozen: v1.6.1
  hooks:
  -   id: check-pre-commit-ci-config

- repo: https://github.com/codespell-project/codespell
  rev: 63c8f8312b7559622c0d82815639671ae42132ac  # frozen: v2.4.1
  hooks:
  - id: codespell
    args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt", "-w"]
    exclude: "doc/styles/typos\\.toml"

- repo: https://github.com/ansys/pre-commit-hooks
  rev: fd1d6b0b4baeb08e32d4de0909999576695c0433  # frozen: v0.5.2
  hooks:
  - id: add-license-headers
    args:
    - --start_year=2022
  - id: tech-review
    args:
    - --product=mechanical

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: check-yaml
  - id: trailing-whitespace
  - id: check-added-large-files

- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 8db279a37c552206d2df62269ff6f9d31125815a  # frozen: 0.37.0
  hooks:
    - id: check-github-workflows

- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: b546b77c44c466a54a42af5499dcc0dcc1a3193f  # frozen: v1.22.0
  hooks:
    - id: zizmor
      args: ["--pedantic"]

# Security checks with bandit
- repo: https://github.com/PyCQA/bandit
  rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
  hooks:
    - id: bandit
      args: ['-c', 'pyproject.toml']
      additional_dependencies: ['bandit[toml]']

-   repo: https://github.com/asottile/pyupgrade
    rev: 75992aaa40730136014f34227e0135f63fc951b4  # frozen: v3.21.2
    hooks:
    -   id: pyupgrade

- repo: https://github.com/crate-ci/typos
  rev: 5745f2a8dd91cd7b684680e2e10a2b388ba6e5cf  # frozen: v1
  hooks:
    - id: typos
      args: ["--config", "doc/styles/typos.toml"]
      exclude: "doc/styles/config/vocabularies"