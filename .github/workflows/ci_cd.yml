name: GitHub CI

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '00 22 * * *'  # UTC time, may start 5-15 mins later than scheduled time
  # registry_package:
    # Run workflow when package is published or updated
    # types: [published]
  push:
    tags:
      - "*"
    branches:
      - main
      - release/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doc-build:
    name: Documentation
    runs-on: public-ubuntu-latest-8-cores #ubuntu-latest
    container:
      image: ghcr.io/ansys/mechanical:24.1.0
      options: --entrypoint /bin/bash
    needs: []

    steps:

      - name: Install Git and checkout project
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt update
          apt install --reinstall ca-certificates
          apt install software-properties-common -y
          add-apt-repository ppa:deadsnakes/ppa -y
          apt install -y python3.10 python3.10-venv
          python3.10 -m venv /env

      - name: Install system dependencies
        run: |
          apt update
          apt install -y sudo curl lsb-release
          apt install -y zip pandoc libgl1-mesa-glx mesa-utils xvfb texlive-latex-extra latexmk nodejs npm graphviz
          apt install -y tini
          npm install -g @mermaid-js/mermaid-cli

      - name: Install Python requirements
        run: |
          . /env/bin/activate
          pip install -e .[doc]

      - name: Build docs
        env:
          SPHINXOPTS: '-j auto'
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
          ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}
          ANSYS_WORKBENCH_LOGGING_FILTER_LEVEL: 3
        run: |
          . /env/bin/activate
          # Generate html or pdf doc
          make_doc() {
            output_file=doc_$1_output.txt
            xvfb-run mechanical-env make -C doc html 2>&1 | tee $output_file
            #cat $output_file
            echo done running make
            validate_output $output_file
          }

          # Validate that the html or pdf build succeeded
          validate_output() {
            echo "validating output of build"
            if grep -q "build succeeded" $1; then
              echo "Documentation building succeeded"
            else
              echo "Documentation building failed"
              exit 1
            fi
          }

          # Create the html doc & validate results
          echo "Generating html documentation"
          make_doc html
