name: GitHub CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      revn:
        type: choice
        options:
        - 'candidate'
        - '271'
        - '261'
        - '252'
        - '251'
        - '242'
        description: 'The Mechanical revision number to run tests on.'
        default: '261' # Same as STABLE_REVN
  schedule:
    - cron: '00 22 * * *'  # UTC time, may start 5-15 mins later than scheduled time
  push:
    tags:
      - "*"
    branches:
      - main
      - release/*

env:
  PYMECHANICAL_PORT: 10000  # default won't work on GitHub runners
  PYMECHANICAL_START_INSTANCE: false
  DOCKER_PACKAGE: ghcr.io/ansys/mechanical
  DOCKER_MECH_CONTAINER_NAME: mechanical
  PACKAGE_NAME: ansys-mechanical-core
  DOCUMENTATION_CNAME: mechanical.docs.pyansys.com
  MAIN_PYTHON_VERSION: '3.12'
  STABLE_REVN: '261'
  # DEV_REVN & its Docker image are used in scheduled or registry package runs
  DEV_REVN: '271'
  LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
  ANSYSLMD_LICENSE_FILE: 1055@${{ secrets.LICENSE_SERVER }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:

  # ── Changelog (tag push only) ──────────────────────────────────────────
  update-changelog:
    name: "Update CHANGELOG for new tag"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to create changelog entries in repository
      pull-requests: write   # Required to create pull requests for changelog updates
    steps:
      - uses: ansys/actions/doc-deploy-changelog@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  # ── Style & security checks ───────────────────────────────────────────
  style:
    uses: ./.github/workflows/style.yml
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results from security scanning
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      main-python-version: ${{ env.MAIN_PYTHON_VERSION }}
      package-name: ${{ env.PACKAGE_NAME }}

  # ── Revision & container configuration ─────────────────────────────────
  revn-config:
    uses: ./.github/workflows/revn-config.yml
    permissions:
      contents: read
      packages: read     # Required to pull Docker images from GitHub Container Registry
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      docker-package: ${{ env.DOCKER_PACKAGE }}
      stable-revn: ${{ env.STABLE_REVN }}
      dev-revn: ${{ env.DEV_REVN }}
      revn-input: ${{ github.event.inputs.revn || '' }}

  # ── Build & smoke tests ───────────────────────────────────────────────
  smoke-tests:
    needs: [style]
    uses: ./.github/workflows/smoke-tests.yml
    permissions:
      contents: read
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      package-name: ${{ env.PACKAGE_NAME }}

  # ── Test suites ────────────────────────────────────────────────────────
  tests:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-test') }}
    needs: [style, revn-config, smoke-tests]
    uses: ./.github/workflows/tests.yml
    permissions:
      contents: read
      packages: read  # Required to pull Docker images from GitHub Container Registry
      checks: write   # Needed to publish test results and status checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      main-python-version: ${{ env.MAIN_PYTHON_VERSION }}
      docker-package: ${{ env.DOCKER_PACKAGE }}
      test-container: ${{ needs.revn-config.outputs.test_container }}
      test-revn: ${{ needs.revn-config.outputs.test_revn }}
      test-docker-image-version: ${{ needs.revn-config.outputs.test_docker_image_version }}
      container-stable-exit: ${{ needs.revn-config.outputs.container_stable_exit }}
      matrix-json: ${{ needs.revn-config.outputs.matrix }}

  test-check:
    name: Tests check
    runs-on: ubuntu-latest
    needs: [tests]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check test results
        env:
          TESTS_RESULT: ${{ needs.tests.result }}
        run: |
          if [[ "${TESTS_RESULT}" == "success" || "${TESTS_RESULT}" == "skipped" ]]; then
            echo "All test jobs passed or skipped — OK"
          else
            echo "Test jobs failed: ${TESTS_RESULT}"
            exit 1
          fi

  # ── Documentation build ────────────────────────────────────────────────
  docs:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-doc') }}
    needs: [style, revn-config]
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      packages: read  # Required to pull Docker images from GitHub Container Registry
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      main-python-version: ${{ env.MAIN_PYTHON_VERSION }}
      test-container: ${{ needs.revn-config.outputs.test_container }}
      container-stable-exit: ${{ needs.revn-config.outputs.container_stable_exit }}

  doc-build-check:
    name: Documentation check
    runs-on: ubuntu-latest
    needs: [docs]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check doc-build result
        env:
          DOC_BUILD_RESULT: ${{ needs.docs.result }}
        run: |
          if [[ "${DOC_BUILD_RESULT}" == "success" || "${DOC_BUILD_RESULT}" == "skipped" ]]; then
            echo "doc-build passed or skipped — OK"
          else
            echo "doc-build failed"
            exit 1
          fi

  doc-deploy-pr:
    name: "Deploy PR documentation"
    runs-on: ubuntu-latest
    needs: [docs]
    if: always() && needs.docs.result == 'success'
    permissions:
      contents: write        # Required to push documentation to gh-pages branch
      pull-requests: write   # Needed to comment on PR with documentation link
    steps:
      - uses: ansys/actions/doc-deploy-pr@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          maximum-pr-doc-deployments: 10

  # ── Coverage ───────────────────────────────────────────────────────────
  coverage:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-test') }}
    needs: [tests]
    uses: ./.github/workflows/coverage.yml
    permissions:
      contents: read
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      main-python-version: ${{ env.MAIN_PYTHON_VERSION }}
      package-name: ${{ env.PACKAGE_NAME }}

  coverage-check:
    name: Coverage check
    runs-on: ubuntu-latest
    needs: [coverage]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Check coverage result
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          if [[ "${COVERAGE_RESULT}" == "success" || "${COVERAGE_RESULT}" == "skipped" ]]; then
            echo "coverage passed or skipped — OK"
          else
            echo "coverage failed"
            exit 1
          fi

  # ── Package ────────────────────────────────────────────────────────────
  package:
    name: Package library
    needs: [smoke-tests, test-check, doc-build-check]
    runs-on: ubuntu-latest
    permissions:
      attestations: write  # Required to generate package attestations for security
      contents: read
      id-token: write      # Needed for OIDC authentication when generating attestations
    steps:
      - name: Build library source and wheel artifacts
        uses: ansys/actions/build-library@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true

  # ── Release ────────────────────────────────────────────────────────────
  release:
    name: Release project to GitHub
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: [package, update-changelog]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication during release
      contents: write  # Needed to create GitHub releases and upload assets
    steps:
      - name: Release to GitHub
        uses: ansys/actions/release-github@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          library-name: ${{ env.PACKAGE_NAME }}
          only-code: true

  release-pypi:
    name: Release project to PyPI
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: [package, update-changelog]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for PyPI trusted publisher authentication
      contents: write  # Needed to download release artifacts
    steps:
      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      - name: "Upload artifacts to PyPI using trusted publisher"
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
          skip-existing: false

  # ── Documentation deployment ───────────────────────────────────────────
  upload_dev_docs:
    name: Upload dev documentation
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [package]
    permissions:
      contents: write  # Required to push documentation to gh-pages branch
    steps:
      - name: Deploy the latest documentation
        uses: ansys/actions/doc-deploy-dev@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  upload_docs_release:
    name: Upload release documentation
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      contents: write  # Required to push stable documentation to gh-pages branch
    steps:
      - name: Deploy the stable documentation
        uses: ansys/actions/doc-deploy-stable@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  # ── Notifications ──────────────────────────────────────────────────────
  get-date:
    name: Get date
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    permissions:
      contents: read
    steps:
      - name: Get current date
        id: date
        run: |
          echo "date=$(date --iso-8601)" >> $GITHUB_OUTPUT

  notify-on-failure:
    name: Notify on failure
    needs: [get-date, tests, docs]
    if: github.event_name == 'schedule' && (failure() || cancelled())
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC authentication with notification services
      contents: read
    steps:
      - name: Microsoft Teams Notification
        uses: skitionek/notify-microsoft-teams@0953822ab410e9a50e2abd2d6d8f85230b1ae4d6 # v1.1.0
        with:
          webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
          # Message to send to Teams as a webhook notification in JSON Payload format
          raw: >-
            {
              "type": "message",
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                    "type": "AdaptiveCard",
                    "version": "1.0",
                    "body": [
                      {
                        "type": "TextBlock",
                        "text": "**PyMechanical Nightly Run Failed on ${{ needs.get-date.outputs.date }}**\n\n[View details in GitHub Actions](https://github.com/ansys/pymechanical/actions/runs/${{ github.run_id }})",
                        "wrap": true
                      }
                    ]
                  }
                }
              ]
            }
