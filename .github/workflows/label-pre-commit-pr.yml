name: Auto-label pre-commit CI PRs

on:
  pull_request:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  auto-label:
    name: Add skip-doc and skip-tests labels to pre-commit CI PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'pre-commit-ci[bot]'
    permissions:
      pull-requests: write  # Required to add labels to pull requests
    steps:
      - name: Add skip-doc and skip-tests labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr edit "${PR_NUMBER}" --add-label "skip-doc" --add-label "skip-test" --repo "${REPO}"
