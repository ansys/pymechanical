# Manual cleanup of untagged GHCR package versions. The same step runs on schedule
# from `.github/workflows/nightly.yml` after the nightly Mechanical test jobs.
name: Package cleanup
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  cleanup:
    name: "Delete untagged package versions"
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required to access repository metadata
      packages: write        # Needed to delete untagged package versions
    steps:
      - name: "Delete untagged package versions"
        uses: ansys/actions/hk-package-clean-untagged@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          package-org: 'ansys'
          package-name: 'mechanical'
          allow-last-days: '7'
          token: ${{ secrets.GITHUB_TOKEN }}