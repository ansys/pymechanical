name: "Upload Coverage Artifacts"
description: "Upload .cov directory and .coverage file as separate artifacts"
inputs:
  artifact-name:
    description: "Base name for coverage artifacts (e.g. 'tests-embedding')"
    required: true
runs:
  using: "composite"
  steps:
    - name: Upload coverage results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        include-hidden-files: true
        name: coverage-${{ inputs.artifact-name }}
        path: .cov
        retention-days: 7

    - name: Upload coverage results (as .coverage)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        include-hidden-files: true
        name: coverage-file-${{ inputs.artifact-name }}
        path: .coverage
        retention-days: 7
