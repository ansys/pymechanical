name: 🐞 Bug, problem, error
description: Fill a bug report here
title: "Bug located in ..."
labels: ["bug"]
assignees: [""]

body:

  - type: markdown
    attributes:
      value: '# 🐞 **Problem**'

  - type: checkboxes
    id: new-bug
    attributes:
      label: Before submitting the issue
      description: Please, make sure the following conditions are met
      options:
      - label: >-
          I have verified whether the issue reproduces in Mechanical directly
          (paste your script into the Mechanical scripting window or run it in
          batch mode via `ansys-mechanical -i test.py`). If it reproduces there,
          the issue is likely in Mechanical rather than PyMechanical.
          
          If it is an issue in Mechanical, please check with the Ansys support 
          coordinator (ASC) at your company to determine who provides
          support for your company or visit the Contacts and Locations page.
        required: true
      - label: I have searched among the existing issues
        required: true
      - label: I am using a Python virtual environment
        required: true

  - type: textarea
    id: bug-description
    attributes:
      label: Description of the bug
      placeholder: Describe what bug you encountered and what should have happened
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps To Reproduce
      placeholder: Please write the steps in a list form
    validations:
      required: true

  - type: markdown
    attributes:
      value: '# 🖥️ **System Information**'

  - type: dropdown
    id: os-name
    attributes:
      label: Which Operating System are you using?
      multiple: false
      options:
       - 'Windows'
       - 'Linux'
    validations:
      required: true

  - type: dropdown
    id: python-version
    attributes:
      label: Which Python version are you using?
      description: Run `python --version` to verify your Python version
      multiple: false
      options:
       - '3.10'
       - '3.11'
       - '3.12'
       - '3.13'
       - '3.14'
    validations:
      required: true

  - type: textarea
    id: installed-packages
    attributes:
      label: Installed packages
      description: Run `python -m pip freeze` to list installed packages
      placeholder: Paste the output of `python -m pip freeze` here
    validations:
      required: true
